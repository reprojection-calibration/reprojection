name: "Docker Build Composite Action"
description: "Docker build with cache and optional build arguments."

inputs:
  target:
    required: true
  scope:
    required: true
  file:
    default: building/Dockerfile
    required: false
  build-args:
    required: false

runs:
  using: "composite"
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.scope }}
        file: ${{ inputs.file }}
        target: ${{ inputs.target }}