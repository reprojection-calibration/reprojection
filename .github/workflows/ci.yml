name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# NOTE(Jack): I wish that we could have use the "regular" github actions variable style here, but for whatever reason
# that does not work at least in matrix builds which means we have to use yaml anchors here.
env:
  UBUNTU_20_BASE: &ubuntu_20_base ubuntu:20.04@sha256:8feb4d8ca5354def3d8fce243717141ce31e2c428701f6682bd2fafe15388214
  UBUNTU_24_BASE: &ubuntu_24_base ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c

jobs:
  code-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: code-checks
          target: code-checks-stage

  code-checks-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: code-checks-python
          target: code-checks-python-stage

  debug-build:
    needs: code-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: debug-build
          target: debug-build-stage

  code-coverage-assertion:
    needs: debug-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: code-coverage-assertion
          external_cache_scope: debug-build
          target: code-coverage-assertion-stage

  python-tooling:
    needs: code-checks-python
    runs-on: ubuntu-latest
    steps:
      # Objects stored with git-lfs need to be pulled, we follow the example at this link:
      # https://github.com/roim/docker-action-lfs/blob/main/.github/workflows/custom-context--working.yml
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: python-tooling
          context: .
          target: python-tooling-stage

  dashboard-smoke-test:
    needs: python-tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: dashboard-smoke-test
          context: .
          external_cache_scope: python-tooling
          load: true
          tag: reprojection:dashboard-smoke-test-stage
          target: dashboard-smoke-test-stage
      # If we do not get a positive health status in 30 seconds the test should fail.
      - name: Run dashboard smoke test
        run: |
          docker run --detach --name dashboard-smoke-test reprojection:dashboard-smoke-test-stage
          timeout 30s bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" dashboard-smoke-test)" = "healthy" ]; do
              sleep 1
            done
          '

  test-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: test-data
          context: .
          target: test-data-stage

  application-integration-tests:
    name: ${{ matrix.applications.target }}
    # NOTE(Jack): We do not use the debug-build here directly but if that fails then there is no point of running the
    # integration tests.
    needs: [ debug-build, test-data ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/docker-build
        with:
          build-args: BASE_IMAGE=${{ matrix.applications.base }}
          cache_scope: ${{ matrix.applications.cache_scope }}
          context: .
          external_cache_scope: test-data
          external_cache_scope_1: ${{ matrix.applications.external_cache_scope_1 }}
          target: ${{ matrix.applications.target }}
    strategy:
      matrix:
        applications:
          - base: *ubuntu_20_base
            cache_scope: ros1-integration-test
            target: ros1-integration-test-stage
          - base: *ubuntu_24_base
            cache_scope: ros2-integration-test
            external_cache_scope_1: debug-build
            target: ros2-integration-test-stage
          - base: *ubuntu_24_base
            cache_scope: video-file-integration-test
            external_cache_scope_1: debug-build
            target: video-file-integration-test-stage

  entrypoint-smoke-tests:
    name: ${{ matrix.applications.target }}
    needs: [ application-integration-tests ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/docker-build
        with:
          build-args: BASE_IMAGE=${{ matrix.applications.base }}
          context: .
          external_cache_scope: test-data
          external_cache_scope_1: ${{ matrix.applications.external_cache_scope_1 }}
          load: true
          tag: reprojection:${{ matrix.applications.target }}
          target: ${{ matrix.applications.target }}
      - name: Run application smoke test
        run: |
          docker run --rm \
            reprojection:${{ matrix.applications.target }} \
            --config /data/minimum_config.toml \
            --data ${{ matrix.applications.data }} \
            --workspace /data/
    strategy:
      matrix:
        applications:
          - base: *ubuntu_20_base
            data: /data/dataset-calib-imu4_512_16.bag
            external_cache_scope_1: ros1-integration-test
            target: ros1-app-smoke-test-stage
          - base: *ubuntu_24_base
            data: /data/dataset-calib-imu4_512_16/
            external_cache_scope_1: ros2-integration-test
            target: ros2-app-smoke-test-stage
          - base: *ubuntu_24_base
            data: /data/dataset-calib-imu4_512_16.mp4
            external_cache_scope_1: video-file-integration-test
            target: video-file-app-smoke-test-stage
