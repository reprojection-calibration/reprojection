name: CI

# TODO(Jack): Currently the base stages are not available for reuse in one generic cached stage. We should be able to do
# this for the ubuntu 24 build path using the external_cache_scope.

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: code-checks
          target: code-checks-stage
  code-checks-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: code-checks-python
          target: code-checks-python-stage
  debug-build:
    needs: code-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: debug-build
          target: debug-build-stage
  code-coverage-assertion:
    needs: debug-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: code-coverage-assertion
          external_cache_scope: debug-build
          target: code-coverage-assertion-stage
  python-tooling:
    needs: code-checks-python
    runs-on: ubuntu-latest
    steps:
      # Objects stored with git-lfs need to be pulled, we follow the example at this link:
      # https://github.com/roim/docker-action-lfs/blob/main/.github/workflows/custom-context--working.yml
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/docker-build
        with:
          context: .
          cache_scope: python-tooling
          target: python-tooling-stage
  test-data-download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          cache_scope: test-data-download
          target: test-data-download-stage
  application-integration-tests:
    # NOTE(Jack): We do not use the debug-build here directly but if that fails then there is no point of running the
    # integration tests.
    needs: [ debug-build, test-data-download ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          build-args: BASE_IMAGE=${{ matrix.applications.base }}
          cache_scope: ${{ matrix.applications.cache_scope }}
          context: .
          external_cache_scope: test-data-download
          target: ${{ matrix.applications.target }}
    strategy:
      matrix:
        applications:
          - base: ubuntu:20.04@sha256:8feb4d8ca5354def3d8fce243717141ce31e2c428701f6682bd2fafe15388214
            cache_scope: ros1-integration-test
            target: ros1-integration-test-stage
            # TODO(Jack): I think the ros2 and video-file pipelines do a lot of duplicated work, basically up to the
            # point of building the release image. Technically they should be able to share all that work. If GHA usage
            # becomes a problem we can maybe optimize here.
          - base: ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
            cache_scope: ros2-integration-test
            target: ros2-integration-test-stage
          - base: ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
            cache_scope: video-file-integration-test
            target: video-file-integration-test-stage
  entrypoint-smoke-tests:
    needs: [ application-integration-tests ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - run: git lfs pull
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          build-args: BASE_IMAGE=${{ matrix.applications.base }}
          cache_scope: ${{ matrix.applications.cache_scope }}
          context: .
          external_cache_scope: test-data-download
          load: true
          tag: reprojection:${{ matrix.applications.target }}
          target: ${{ matrix.applications.target }}
      - name: Run application smoke test
        run: |
          docker run --rm \
            reprojection:${{ matrix.applications.target }} \
            --config /data/minimum_config.toml \
            --data ${{ matrix.applications.data }} \
            --workspace /data/
    strategy:
      matrix:
        applications:
          - base: ubuntu:20.04@sha256:8feb4d8ca5354def3d8fce243717141ce31e2c428701f6682bd2fafe15388214
            cache_scope: ros1-integration-test
            data: /data/dataset-calib-imu4_512_16.bag
            target: ros1-app-smoke-test-stage
          - base: ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
            cache_scope: ros2-integration-test
            data: /data/dataset-calib-imu4_512_16/
            target: ros2-app-smoke-test-stage
          - base: ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
            cache_scope: video-file-integration-test
            data: /data/dataset-calib-imu4_512_16.mp4
            target: video-file-app-smoke-test-stage
