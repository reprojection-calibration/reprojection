name: "Docker Build (with cache)"
description: "Reusable docker build step with GHA cache"

inputs:
  target:
    required: true
  scope:
    required: true
  context:
    required: false
    default: .
  file:
    required: false
    default: building/Dockerfile
  build-args:
    required: false

runs:
  using: "composite"
  steps:
    - uses: docker/setup-buildx-action@v3

    - uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        target: ${{ inputs.target }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.scope }}